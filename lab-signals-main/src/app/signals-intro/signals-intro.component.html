<div>
  <h2>Elementos Químicos</h2>
  <ul>
    <li
      *ngFor="let element of service.elements"
      (click)="service.selectElement(element)"
    >
      {{ element.name }} ({{ element.symbol }})
    </li>
  </ul>

  <p *ngIf="service.selectedElement()">
    Sinal Gravável - Elemento Selecionado: {{ service.selectedElement()?.name }}
  </p>

  <p>Sinal Computado - Informações Detalhadas: {{ service.elementInfo() }}</p>
</div>
