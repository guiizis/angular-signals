<div>
  <h2>Elementos Químicos</h2>
  <ul>
    <li
      *ngFor="let element of elements"
      (click)="selectElement(element)"
    >
      {{ element.name }} ({{ element.symbol }})
    </li>
  </ul>

  <p *ngIf="selectedElement()">
    Sinal Gravável - Elemento Selecionado: {{ selectedElement()?.name }}
  </p>

  <p>Sinal Computado - Informações Detalhadas: {{ elementInfo() }}</p>
</div>
