<h2>Lista de Elementos Químicos</h2>
<ul>
  <li *ngFor="let element of elementService.elements">
    {{ element.name }} ({{ element.symbol }})

    <button (click)="changeFavorite(element)">
      <span *ngIf="elementService.getFavorites().includes(element)">
        <i class="fa-solid fa-star"></i>
      </span>
      <span *ngIf="!elementService.getFavorites().includes(element)">
         <i class="fa-regular fa-star"></i>
      </span>
    </button>
  </li>
</ul>
