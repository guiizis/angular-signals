<h2>Simulação de Estado Físico</h2>
<ul>
  <li *ngFor="let element of elements" (click)="selectElement(element)">
    {{ element.name }} ({{ element.symbol }})
  </li>
</ul>

<div *ngIf="selectedElement()" class="selection">
  <div class="elements">
    <p>Element Selecionado: {{ selectedElement()?.name }}</p>
  </div>
  <div class="temperature">
    <p>Temperatura Atual: {{ temperature() }}°C</p>
    <button (click)="adjustTemperature(temperature() + 10)">Aumentar Temperatura</button>
    <button (click)="adjustTemperature(temperature() - 10)">Diminuir Temperatura</button>
  </div>
  <p>Estado Físico: {{ physicalState() }}</p>
</div>
